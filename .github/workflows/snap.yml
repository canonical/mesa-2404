name: Snap

on:
  merge_group:
    types: [checks_requested]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

jobs:
  Snap:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON((github.event_name == 'merge_group' || github.repository == github.event.pull_request.head.repo.full_name) && '["amd64"]' || '["amd64"]') }}

    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0  # needed for version determination
        persist-credentials: false

    - name: Build and publish the snap
      id: build-snap
      uses: canonical/actions/build-snap@bd56f0f0934af9edbbd49378645727d7ef7a4571 # release @ 2025.03.27
      with:
        architecture: ${{ matrix.platform }}
        snapcraft-token: ${{ secrets.SNAPCRAFT_TOKEN }}
        snapcraft-channel: edge
        launchpad-credentials: ${{ secrets.LAUNCHPAD_CREDENTIALS }}
        publish: ${{ github.event_name == 'pull_request' && github.repository == github.event.pull_request.head.repo.full_name }}
        publish-channel: edge/pr${{ github.event.number }}

    - name: Test the snap
      if: ${{ matrix.platform == 'amd64' }}
      env:
        SNAP_PATH: ${{ steps.build-snap.outputs.snap-path }}
      run: |
        sudo snap install core26 --edge
        sudo snap install --dangerous ${SNAP_PATH}
        sudo snap install mir-test-tools --channel 26/edge
        sudo snap connect mir-test-tools:login-session-control
        sudo snap connect mir-test-tools:gpu-2604 mesa-2604

        sudo adduser $USER video
        sudo adduser $USER input

        sudo -u $USER mir-test-tools.smoke-test

    - if: ${{ failure() && runner.debug }}
      name: Set up tmate session (restart with debug logging to activate)
      uses: mxschmitt/action-tmate@fb436d6daa7781a8ac1fe5474f1e0cb2664b6123 # v3.21
      with:
        limit-access-to-actor: true
